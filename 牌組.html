<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和風翻翻牌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f1eb;
            font-family: "Microsoft JhengHei";
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
            padding: 30px 0;
        }

        /*  Header*/
        .header {
            background: #364f6b;
            color: white;
            padding: 20px 30px;
            border-radius: 12px 12px 0 0;
        }

        .title-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .title-line {
            width: 6px;
            height: 40px;
            background: #71d4cf;
        }

        .title-area h1 {
            font-size: 28px;
        }

        .title-area p {
            color: #9aa6b2;
            letter-spacing: 3px;
        }

        .score-board {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
        }

        .score-item {
            text-align: center;
        }

        .score-item span {
            font-size: 36px;
            color: #f4b183;
            font-weight: bold;
        }

        .score-item p {
            color: #8ea1b3;
        }

        #restartBtn {
            padding: 12px 24px;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            background: #3a699b;
            color: white;
        }

        #restartBtn:hover {
            opacity: .8;
        }

        /* 遊戲區 */
        .game-board {
            background: #f4f1eb;
            padding: 30px;

            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;

        }

        /*卡牌 */
        .card {
            height: 150px;
            position: relative;
            box-shadow: 0 4px 8px rgba(0, 0, 0, .2);
            cursor: pointer;
            transform-style: preserve-3d;
            transition: .5s;
        }

        .card.flip {
            transform: rotateY(180deg);
        }

        .front,
        .back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            backface-visibility: hidden;
        }

        .front {
            background: #2b5781;
            color: #fff;
            font-size: 40px;
            border: 2px solid #355a7a;
        }

        /* 背面 */
        .back {
            background: linear-gradient(135deg, #c1d7ee, #81b8e9);
            font-size: 50px;
            transform: rotateY(180deg);
        }

        .front::before {
            content: "";

            position: absolute;

            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;

            border: 2px solid rgba(255, 255, 255, .15);
            border-radius: 12px;
        }

        .matched {
            pointer-events: none;
            opacity: .7;
        }

        @media(max-width:768px) {
            .game-board {
                grid-template-columns: repeat(2, 1fr);
            }
            .score-board {
                flex-wrap: wrap;
                gap: 20px;
            }

        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="title-area">
                <div class="title-line"></div>
                <div>
                    <h1>和風翻牌</h1>
                    <p>MEMORY GAME</p>
                </div>
            </div>
            <div class="score-board">
                <div class="score-item">
                    <span id="moves">0</span>
                    <p>翻牌次數</p>
                </div>
                <div class="score-item">
                    <span id="matched">0</span>
                    <p>已配對</p>
                </div>
                <div class="score-item">
                    <span id="remain">8</span>
                    <p>剩餘</p>
                </div>
                <button id="restartBtn">重新開始</button>

            </div>

        </div>

        <!-- 卡片區 -->
        <div class="game-board" id="gameBoard"></div>

    </div>
    <script>
        const gameBoard = document.querySelector("#gameBoard");

        const movesEl = document.querySelector("#moves");
        const matchedEl = document.querySelector("#matched");
        const remainEl = document.querySelector("#remain");

        const restartBtn = document.querySelector("#restartBtn");

        /* 8組圖案*/
        const icons = [
            "🌸",
            "🍵",
            "🎎",
            "🏯",
            "🗾",
            "🎋",
            "🦊",
            "🌙"
        ];

        let cards = [];
        let firstCard = null;
        let secondCard = null;

        let lockBoard = false;

        let moves = 0;
        let matchedPairs = 0;
        /* =====================
           初始化
        ===================== */
        function initGame() {
            cards = [...icons, ...icons];

            shuffle(cards);
            gameBoard.innerHTML = "";
            moves = 0;
            matchedPairs = 0;

            updateScore();

            cards.forEach(icon => {
                const card = document.createElement("div");

                card.classList.add("card");
                card.innerHTML = `
            <div class="front">和</div>
            <div class="back">${icon}</div>
        `;
                card.dataset.icon = icon;
                card.addEventListener("click", flipCard);
                gameBoard.appendChild(card);

            });

        }
        /* =====================
           洗牌
        ===================== */

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(
                    Math.random() * (i + 1)
                );

                [array[i], array[j]] = [array[j], array[i]];
            }

        }
        /* =====================
           翻牌
        ===================== */
        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;
            this.classList.add("flip");

            if (!firstCard) {
                firstCard = this;
                return;
            }
            secondCard = this;
            moves++;

            updateScore();
            checkMatch();

        }
        /* =====================
           比對
        ===================== */
        function checkMatch() {
            const isMatch =
                firstCard.dataset.icon === secondCard.dataset.icon;

            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        }
        /* =====================
           配對成功
        ===================== */
        function disableCards() {
            firstCard.classList.add("matched");
            secondCard.classList.add("matched");
            matchedPairs++;

            updateScore();
            resetBoard();

            if (matchedPairs === 8) {
                setTimeout(() => {
                    alert(
                        `恭喜完成！\n總翻牌次數：${moves}`
                    );
                }, 300);
            }
        }

        /* =====================
           配對失敗
        ===================== */
        function unflipCards() {

            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove("flip");
                secondCard.classList.remove("flip");
                resetBoard();

            }, 1000);
        }
        /* =====================
           重置翻牌狀態
        ===================== */
        function resetBoard() {
            [firstCard, secondCard] =
                [null, null];
            lockBoard = false;

        }
        /* =====================
           更新資訊
        ===================== */
        function updateScore() {
            movesEl.textContent = moves;
            matchedEl.textContent = matchedPairs;
            remainEl.textContent = 8 - matchedPairs;
        }
        /* =====================
           重新開始
        ===================== */
        restartBtn.addEventListener(
            "click",
            initGame
        );
        /* =====================
           啟動
        ===================== */
        initGame();
    </script>

</body>

</html>
</body>

</html>
