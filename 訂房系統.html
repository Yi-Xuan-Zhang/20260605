<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂房系統</title>

    <style>
        /* ==========================
           基本設定
        ========================== */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        body {
            background: #f5f7fa;
            padding: 40px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        /* ==========================
           房型卡片
        ========================== */

        .room-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .room-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,.1);
            cursor: pointer;
            transition: .3s;
        }

        .room-card:hover {
            transform: translateY(-5px);
        }

        .room-card.active {
            border: 3px solid #8da4be;
        }

        .room-card h3 {
            margin-bottom: 10px;
        }

        .price {
            color: #f3341f;
            font-weight: bold;
            font-size: 20px;
        }

        /* ==========================
           訂房表單
        ========================== */

        .booking-box {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        /* ==========================
           訂單摘要
        ========================== */

        .summary {
            margin-top: 25px;
            background: #eaf2fa;
            padding: 20px;
            border-radius: 10px;
        }

        .summary p {
            margin: 8px 0;
        }

        .total {
            font-size: 24px;
            color: #f33f2b;
            font-weight: bold;
        }

        /* ==========================
           按鈕
        ========================== */

        button {
            width: 100%;
            padding: 15px;
            border: none;
            background: #6b94c4;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
        }

        button:hover {
            background: #3578c9;
        }

        .message {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            color: rgb(18, 74, 119);
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🏨 線上訂房系統</h1>

        <!-- ==========================
             房型列表
        ========================== -->

        <div class="room-list" id="roomList"></div>

        <!-- ==========================
             訂房表單
        ========================== -->

        <div class="booking-box">

            <div class="form-group">
                <label>入住日期</label>
                <input type="date" id="checkIn">
            </div>

            <div class="form-group">
                <label>退房日期</label>
                <input type="date" id="checkOut">
            </div>

            <div class="form-group">
                <label>入住人數</label>
                <select id="guests">
                    <option value="1">1人</option>
                    <option value="2">2人</option>
                    <option value="3">3人</option>
                    <option value="4">4人</option>
                </select>
            </div>

            <!-- 訂單摘要 -->

            <div class="summary">
                <p>房型：<span id="roomName">尚未選擇</span></p>
                <p>住宿天數：<span id="days">0</span> 晚</p>
                <p>每晚價格：$<span id="nightPrice">0</span></p>
                <p class="total">
                    總金額：$<span id="totalPrice">0</span>
                </p>
            </div>

            <br>

            <button id="bookBtn">
                立即訂房
            </button>

            <div class="message" id="message"></div>

        </div>

    </div>

    <script>

        /* ==========================
           房型資料
        ========================== */

        const rooms = [
            {
                id: 1,
                name: "標準雙人房",
                price: 2500,
                maxPeople: 2
            },
            {
                id: 2,
                name: "豪華家庭房",
                price: 4200,
                maxPeople: 4
            },
            {
                id: 3,
                name: "海景套房",
                price: 6800,
                maxPeople: 4
            }
        ];

        let selectedRoom = null;

        const roomList = document.getElementById("roomList");

        /* ==========================
           顯示房型列表
        ========================== */

        rooms.forEach(room => {

            const card = document.createElement("div");

            card.className = "room-card";

            card.innerHTML = `
                <h3>${room.name}</h3>
                <p class="price">$${room.price}/晚</p>
                <p>入住上限：${room.maxPeople}人</p>
            `;

            card.addEventListener("click", () => {

                document
                    .querySelectorAll(".room-card")
                    .forEach(item => item.classList.remove("active"));

                card.classList.add("active");

                selectedRoom = room;

                updateSummary();
            });

            roomList.appendChild(card);
        });

        /* ==========================
           DOM
        ========================== */

        const checkIn = document.getElementById("checkIn");
        const checkOut = document.getElementById("checkOut");
        const guests = document.getElementById("guests");

        const roomName = document.getElementById("roomName");
        const daysText = document.getElementById("days");
        const nightPrice = document.getElementById("nightPrice");
        const totalPrice = document.getElementById("totalPrice");

        const message = document.getElementById("message");

        /* ==========================
           即時計算
        ========================== */

        checkIn.addEventListener("change", updateSummary);
        checkOut.addEventListener("change", updateSummary);

        function updateSummary() {

            if (!selectedRoom) return;

            roomName.textContent = selectedRoom.name;
            nightPrice.textContent = selectedRoom.price;

            const inDate = new Date(checkIn.value);
            const outDate = new Date(checkOut.value);

            let days = 0;

            if (checkIn.value && checkOut.value) {

                const diff =
                    outDate.getTime() -
                    inDate.getTime();

                days =
                    diff /
                    (1000 * 60 * 60 * 24);

                if (days > 0) {

                    const total =
                        days *
                        selectedRoom.price;

                    daysText.textContent = days;
                    totalPrice.textContent = total;

                } else {

                    daysText.textContent = 0;
                    totalPrice.textContent = 0;
                }
            }
        }

        /* ==========================
           訂房按鈕
        ========================== */

        document
            .getElementById("bookBtn")
            .addEventListener("click", () => {

                message.classList.remove("error");

                if (!selectedRoom) {

                    message.textContent =
                        "請先選擇房型";

                    message.classList.add("error");
                    return;
                }

                if (!checkIn.value ||
                    !checkOut.value) {

                    message.textContent =
                        "請選擇入住與退房日期";

                    message.classList.add("error");
                    return;
                }

                const inDate =
                    new Date(checkIn.value);

                const outDate =
                    new Date(checkOut.value);

                /* ==========================
                   日期驗證
                   退房不可小於入住
                ========================== */

                if (outDate <= inDate) {

                    message.textContent =
                        "退房日期必須晚於入住日期";
                    message.classList.add("error");
                    return;
                }

                /* ==========================
                   人數驗證
                ========================== */
                if (
                    Number(guests.value)
                    >
                    selectedRoom.maxPeople
                ) {
                    message.textContent =
                        "入住人數超過房型限制";
                    message.classList.add("error");
                    return;
                }
                message.textContent =
                    "✅ 訂房成功！感謝您的預訂";
            });

    </script>

</body>

</html>
